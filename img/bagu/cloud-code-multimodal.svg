<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- 标题 -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#22d3ee" text-anchor="middle">Cloud Code 多模态交互流程</text>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">从设计稿到代码的完整链路</text>

  <!-- 输入层标题 -->
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">输入</text>

  <!-- 图片上传 -->
  <rect x="60" y="150" width="180" height="130" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="100" y="170" width="100" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <path d="M 130 185 L 150 205 L 170 175 M 150 205 L 150 230" stroke="#06b6d4" stroke-width="2" fill="none"/>
  <text x="150" y="250" font-family="Arial, sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">拖拽/粘贴图片</text>
  <text x="150" y="268" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">PNG, JPG, Figma导出</text>

  <!-- MCP Figma -->
  <rect x="260" y="150" width="180" height="130" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow3)"/>
  <circle cx="350" cy="200" r="25" fill="#8b5cf6"/>
  <text x="350" y="207" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">MCP</text>
  <text x="350" y="250" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Figma MCP Server</text>
  <text x="350" y="268" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">获取组件/间距/字体详情</text>

  <!-- 处理层 -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">处理</text>

  <!-- Cloud Code 引擎 -->
  <rect x="300" y="150" width="200" height="130" rx="12" fill="linear-gradient(#1e1e30, #2d1b4e)" stroke="#c084fc" stroke-width="3" filter="url(#shadow3)"/>
  <rect x="340" y="170" width="120" height="60" rx="8" fill="#2d1b4e" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="195" font-family="Arial, sans-serif" font-size="12" fill="#e9d5ff" text-anchor="middle">Claude Model</text>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">+ Tool Calls</text>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="12" fill="#c084fc" text-anchor="middle">Cloud Code 引擎</text>
  <text x="400" y="268" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">上下文理解 + 代码生成</text>

  <!-- 输出层标题 -->
  <text x="650" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">输出</text>

  <!-- 代码输出 -->
  <rect x="560" y="150" width="180" height="130" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="580" y="170" width="140" height="70" rx="8" fill="#0f172a"/>
  <text x="590" y="190" font-family="monospace" font-size="9" fill="#10b981">function App() {</text>
  <text x="600" y="205" font-family="monospace" font-size="9" fill="#6ee7b7">  return (</text>
  <text x="610" y="220" font-family="monospace" font-size="9" fill="#6ee7b7">    &lt;div&gt;...&lt;/div&gt;</text>
  <text x="600" y="235" font-family="monospace" font-size="9" fill="#6ee7b7">  );</text>
  <text x="590" y="250" font-family="monospace" font-size="9" fill="#10b981">}</text>
  <text x="650" y="290" font-family="Arial, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">精确还原代码</text>

  <!-- 连接箭头 -->
  <path d="M 240 215 L 295 215" stroke="#06b6d4" stroke-width="2" fill="none"/>
  <polygon points="290,210 300,215 290,220" fill="#06b6d4"/>

  <path d="M 505 215 L 555 215" stroke="#c084fc" stroke-width="2" fill="none"/>
  <polygon points="550,210 560,215 550,220" fill="#c084fc"/>

  <!-- 底部流程说明 -->
  <rect x="100" y="330" width="600" height="60" rx="10" fill="rgba(255,255,255,0.05)"/>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">两种输入方式对比</text>

  <!-- 方式1 -->
  <rect x="120" y="375" width="260" height="30" rx="6" fill="#334155"/>
  <text x="250" y="395" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">图片方式：直接拖拽，适合简单场景</text>

  <!-- 方式2 -->
  <rect x="420" y="375" width="260" height="30" rx="6" fill="#334155"/>
  <text x="550" y="395" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">MCP方式：获取精确数据，最高还原度</text>

  <!-- 底部补充 -->
  <rect x="100" y="420" width="600" height="40" rx="8" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">配套功能：/compact 压缩上下文 | /clear 清空对话 | CLAUDE.md 项目级指令</text>
</svg>