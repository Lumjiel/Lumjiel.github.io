<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e30"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- 标题 -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Cloud Code 高级功能生态</text>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">构建高度可扩展的编程 Agent 工作流</text>

  <!-- 中心 Cloud Code -->
  <circle cx="400" cy="260" r="70" fill="#1e1e30" stroke="#9333ea" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Cloud</text>
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Code</text>

  <!-- Hooks - 左上 -->
  <rect x="80" y="100" width="160" height="120" rx="12" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="160" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Hooks</text>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="11" fill="#e9d5ff" text-anchor="middle">自动化工作流</text>
  <rect x="100" y="185" width="120" height="25" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="202" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">工具使用后自动执行</text>

  <!-- Skills - 右上 -->
  <rect x="560" y="100" width="160" height="120" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="640" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Agent Skills</text>
  <text x="640" y="170" font-family="Arial, sans-serif" font-size="11" fill="#dbeafe" text-anchor="middle">动态加载提示词</text>
  <rect x="580" y="185" width="120" height="25" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="640" y="202" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">意图自动调用</text>

  <!-- Sub Agents - 左下 -->
  <rect x="80" y="300" width="160" height="120" rx="12" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="160" y="345" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Sub Agents</text>
  <text x="160" y="370" font-family="Arial, sans-serif" font-size="11" fill="#d1fae5" text-anchor="middle">独立上下文子代理</text>
  <rect x="100" y="385" width="120" height="25" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="402" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">适合大型任务</text>

  <!-- Plugins - 右下 -->
  <rect x="560" y="300" width="160" height="120" rx="12" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="640" y="345" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Plugins</text>
  <text x="640" y="370" font-family="Arial, sans-serif" font-size="11" fill="#fef3c7" text-anchor="middle">一键安装全家桶</text>
  <rect x="580" y="385" width="120" height="25" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="640" y="402" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Skills + SubAgents + Hooks</text>

  <!-- 连接线 -->
  <path d="M 240 170 Q 320 170 350 220" stroke="#9333ea" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 560 170 Q 480 170 450 220" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 240 350 Q 320 350 350 290" stroke="#10b981" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 560 350 Q 480 350 450 290" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- 底部功能说明 -->
  <rect x="50" y="440" width="700" height="45" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">
    <tspan>Hooks: 自动格式化 | Skills: 日报生成 | Sub Agents: 代码审查 | Plugins: 前端设计全家桶</tspan>
  </text>
</svg>