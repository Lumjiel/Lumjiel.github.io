<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3a5f"/>
      <stop offset="100%" style="stop-color:#1e2a45"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg1)"/>

  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">Cloud Code 三种核心模式</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="14" fill="#7a8bb5" text-anchor="middle">通过 Shift+Tab 循环切换</text>

  <!-- 中心切换器 -->
  <circle cx="400" cy="250" r="60" fill="#0f3460" stroke="#00d4ff" stroke-width="3"/>
  <text x="400" y="245" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">Shift+Tab</text>
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="10" fill="#7a8bb5" text-anchor="middle">切换模式</text>

  <!-- 默认模式 -->
  <rect x="80" y="150" width="180" height="160" rx="15" fill="url(#card1)" stroke="#4ecdc4" stroke-width="2"/>
  <text x="170" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4ecdc4" text-anchor="middle">默认模式</text>
  <text x="170" y="220" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Default Mode</text>
  <rect x="100" y="240" width="140" height="50" rx="8" fill="#1a1a2e"/>
  <text x="170" y="260" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">最谨慎</text>
  <text x="170" y="275" font-family="Arial, sans-serif" font-size="10" fill="#7a8bb5" text-anchor="middle">每次文件操作都询问</text>

  <!-- 自动模式 -->
  <rect x="310" y="150" width="180" height="160" rx="15" fill="url(#card1)" stroke="#f9a826" stroke-width="2"/>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f9a826" text-anchor="middle">自动模式</text>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Accept Edits On</text>
  <rect x="330" y="240" width="140" height="50" rx="8" fill="#1a1a2e"/>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">效率最高</text>
  <text x="400" y="275" font-family="Arial, sans-serif" font-size="10" fill="#7a8bb5" text-anchor="middle">自动同意所有操作</text>

  <!-- 规划模式 -->
  <rect x="540" y="150" width="180" height="160" rx="15" fill="url(#card1)" stroke="#a855f7" stroke-width="2"/>
  <text x="630" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#a855f7" text-anchor="middle">规划模式</text>
  <text x="630" y="220" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0" text-anchor="middle">Plan Mode</text>
  <rect x="560" y="240" width="140" height="50" rx="8" fill="#1a1a2e"/>
  <text x="630" y="260" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">只讨论不执行</text>
  <text x="630" y="275" font-family="Arial, sans-serif" font-size="10" fill="#7a8bb5" text-anchor="middle">适合复杂方案设计</text>

  <!-- 连接线 -->
  <path d="M 260 250 Q 330 250 350 250" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="5,5" filter="url(#glow)"/>
  <path d="M 450 250 Q 470 250 510 250" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="5,5" filter="url(#glow)"/>
  <path d="M 640 250 Q 700 250 720 200 Q 740 150 710 130" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="5,5" filter="url(#glow)"/>
  <path d="M 80 230 Q 40 230 40 250 Q 40 270 90 290" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="5,5" filter="url(#glow)"/>

  <!-- 底部说明 -->
  <rect x="150" y="380" width="500" height="80" rx="10" fill="#0f3460" opacity="0.6"/>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">使用场景示例</text>
  <text x="400" y="435" font-family="Arial, sans-serif" font-size="12" fill="#7a8bb5" text-anchor="middle">开发待办应用：默认模式生成基础 → 自动模式迭代修改 → 规划模式讨论重构</text>
</svg>